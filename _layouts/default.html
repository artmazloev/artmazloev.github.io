<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — Руководитель T&D | AI и цифровая трансформация обучения{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    <meta property="og:title" content="{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}" />
    <meta property="og:description" content="{{ page.description | default: site.description }}" />
    <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}" />

    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&f[]=cabinet-grotesk@500,700,800&f[]=jetbrains-mono@400,500&display=swap"
      rel="stylesheet"
    />

    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230B1015'/%3E%3Cpath d='M8 22 L16 8 L24 22' stroke='%235EEAD4' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M11.5 17 H20.5' stroke='%235EEAD4' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E"
    />

    {% if page.preload_portrait %}
    <link
      rel="preload"
      as="image"
      href="{{ '/assets/portrait@2x.jpg' | relative_url }}"
      imagesrcset="{{ '/assets/portrait.jpg' | relative_url }} 1x, {{ '/assets/portrait@2x.jpg' | relative_url }} 2x"
      fetchpriority="high"
    />
    {% endif %}

    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}" />
    {% feed_meta %}
    {% seo title=false %}
  </head>
  <body class="{{ page.body_class }}">
    {% include header.html %}

    <main id="top">
      {{ content }}
    </main>

    {% include footer.html %}

    <script src="{{ '/app.js' | relative_url }}" defer></script>
  </body>
</html>
