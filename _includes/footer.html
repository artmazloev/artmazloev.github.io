<footer class="footer">
  <div class="wrap footer__inner">
    <div class="footer__brand">
      <svg viewBox="0 0 32 32" width="22" height="22" aria-hidden="true" fill="none">
        <path d="M6 24 L16 6 L26 24" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10.5 18 H21.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      <span>{{ site.data.site.footer_tagline }}</span>
    </div>
    <div class="footer__meta">
      <span>© <span id="year"></span></span>
      <span aria-hidden="true">·</span>
      <a href="{{ site.data.site.contacts.telegram_url }}" target="_blank" rel="noopener">{{ site.data.site.contacts.telegram_url | remove: 'https://' }}</a>
      <span aria-hidden="true">·</span>
      <a href="mailto:{{ site.data.site.contacts.email }}">{{ site.data.site.contacts.email }}</a>
    </div>
  </div>
</footer>
